---
# yaml-language-server: $schema=https://github.com/mason-org/registry-schema/releases/latest/download/package.schema.json
name: ecfg
description: Editorconfig LSP
homepage: https://github.com/KevinNitroG/ecfg
licenses:
  - proprietary
languages:
  - editorconfig
categories:
  - LSP

source:
  id: pkg:github/KevinNitroG/ecfg@0.1.1
  asset:
    - target: linux_x64
      file: ecfg-lsp_{{version}}_linux_amd64
    - target: linux_arm64
      file: ecfg-lsp_{{version}}_linux_arm64
    - target: darwin_x64
      file: ecfg-lsp_{{version}}_darwin_amd64
    - target: darwin_arm64
      file: ecfg-lsp_{{version}}_darwin_arm64
    - target: win_x64
      file: ecfg-lsp_{{version}}_windows_amd64.exe
    - target: win_arm64
      file: ecfg-lsp_{{version}}_windows_arm64.exe
bin:
  ecfg-lsp: "{{source.asset.file}}"

neovim:
  lspconfig: ecfg
